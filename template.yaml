AWSTemplateFormatVersion: '2010-09-09'
Description: ITHoS Bedrock Agent demo using plain CloudFormation resources (StackSets compatible).

Parameters:
  WorkspaceId:
    Type: String

  WebSocketStageName:
    Type: String
    Default: prod
    Description: WebSocket API stage name

  LambdaCodeS3Bucket:
    Type: String
    Description: S3 bucket containing Lambda deployment artifacts

  OrchestratorCodeS3Key:
    Type: String
    Description: S3 key for orchestrator Lambda zip

  ActionGroupCodeS3Key:
    Type: String
    Description: S3 key for action group Lambda zip

  TicketReaderCodeS3Key:
    Type: String
    Description: S3 key for ticket reader Lambda zip

Resources:
  SupportTicketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ticketId
          AttributeType: S
      KeySchema:
        - AttributeName: ticketId
          KeyType: HASH

  OrchestratorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: OrchestratorInlinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: BedrockInvokeAgent
                Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                Resource: '*'
              - Sid: ManageWebSocketConnections
                Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${WebSocketStageName}/POST/@connections/*
              - Sid: CreateLogGroup
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: '*'
              - Sid: WriteLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*:*

  ActionGroupLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: ActionGroupInlinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: PutSupportTickets
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt SupportTicketsTable.Arn
              - Sid: CreateLogGroup
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: '*'
              - Sid: WriteLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*:*

  TicketReaderLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: TicketReaderInlinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadSupportTickets
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource: !GetAtt SupportTicketsTable.Arn
              - Sid: CreateLogGroup
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: '*'
              - Sid: WriteLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*:*

  OrchestratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Role: !GetAtt OrchestratorLambdaRole.Arn
      Handler: app.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref OrchestratorCodeS3Key
      Environment:
        Variables:
          BEDROCK_AGENT_ID: ''
          BEDROCK_AGENT_ALIAS_ID: ''
          WEBSOCKET_MANAGEMENT_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${WebSocketStageName}

  ActionGroupFunction:
    Type: AWS::Lambda::Function
    Properties:
      Role: !GetAtt ActionGroupLambdaRole.Arn
      Handler: app.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref ActionGroupCodeS3Key
      Environment:
        Variables:
          SUPPORT_TICKETS_TABLE_NAME: !Ref SupportTicketsTable

  TicketReaderFunction:
    Type: AWS::Lambda::Function
    Properties:
      Role: !GetAtt TicketReaderLambdaRole.Arn
      Handler: app.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref TicketReaderCodeS3Key
      Environment:
        Variables:
          SUPPORT_TICKETS_TABLE_NAME: !Ref SupportTicketsTable

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-websocket-api
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action

  WebSocketConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OrchestratorFunction.Arn}/invocations

  WebSocketDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OrchestratorFunction.Arn}/invocations

  WebSocketSendMessageIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OrchestratorFunction.Arn}/invocations

  WebSocketConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      Target: !Sub integrations/${WebSocketConnectIntegration}

  WebSocketDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub integrations/${WebSocketDisconnectIntegration}

  WebSocketSendMessageRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: sendMessage
      Target: !Sub integrations/${WebSocketSendMessageIntegration}

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: !Ref WebSocketStageName
      AutoDeploy: true

  WebSocketInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OrchestratorFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/*

  TicketsHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-tickets-http-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
        AllowHeaders:
          - Content-Type

  TicketsHttpIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref TicketsHttpApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TicketReaderFunction.Arn}/invocations

  TicketsHttpRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref TicketsHttpApi
      RouteKey: GET /tickets
      Target: !Sub integrations/${TicketsHttpIntegration}

  TicketsHttpStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref TicketsHttpApi
      StageName: $default
      AutoDeploy: true

  TicketsHttpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TicketReaderFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${TicketsHttpApi}/*/*/*

  ActionGroupBedrockInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ActionGroupFunction
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

Outputs:
  WebSocketApiEndpoint:
    Description: WebSocket API endpoint (wss)
    Value: !Sub wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${WebSocketStageName}

  TicketsHttpApiEndpoint:
    Description: HTTP GET /tickets endpoint
    Value: !Sub https://${TicketsHttpApi}.execute-api.${AWS::Region}.amazonaws.com/tickets

  OrchestratorLambdaName:
    Description: Orchestrator Lambda function name
    Value: !Ref OrchestratorFunction

  ActionGroupLambdaName:
    Description: Action Group Lambda function name
    Value: !Ref ActionGroupFunction

  TicketReaderLambdaName:
    Description: Ticket Reader Lambda function name
    Value: !Ref TicketReaderFunction

  SupportTicketsTableName:
    Description: DynamoDB support tickets table name
    Value: !Ref SupportTicketsTable
